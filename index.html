<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slime Playground - Step 2</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: rgba(15, 23, 42, 0.82);
      --line: rgba(148, 163, 184, 0.3);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --good: #22c55e;
      --warn: #f59e0b;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: "Inter", "Noto Sans JP", "Yu Gothic", sans-serif;
      background: radial-gradient(circle at top, #1e293b 0%, #020617 80%);
      color: var(--text);
      overflow: hidden;
    }

    .hidden { display: none !important; }

    .screen {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 18px;
      z-index: 20;
    }

    .card {
      width: min(680px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 20px;
      backdrop-filter: blur(8px);
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.35);
    }

    h1, h2 { margin: 0 0 10px; }
    p { margin: 0 0 12px; color: var(--muted); }

    .row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    input, button, select {
      font: inherit;
      border-radius: 10px;
      border: 1px solid var(--line);
      padding: 10px 12px;
    }

    input, select {
      background: rgba(15, 23, 42, 0.6);
      color: var(--text);
      flex: 1;
      min-width: 180px;
    }

    button {
      border: none;
      font-weight: 700;
      background: #0ea5e9;
      color: #082f49;
      cursor: pointer;
    }

    button:hover { filter: brightness(1.08); }

    .sub-btn { background: #64748b; color: #f8fafc; }

    .status {
      min-height: 1.4em;
      color: var(--muted);
      font-size: 0.95rem;
    }

    #gameRoot {
      position: fixed;
      inset: 0;
      background: #87ceeb;
    }

    #hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    .panel {
      position: absolute;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      backdrop-filter: blur(4px);
    }

    #chatPanel {
      top: 12px;
      left: 12px;
      width: min(420px, calc(100vw - 24px));
      pointer-events: auto;
    }

    #chatLog {
      max-height: 210px;
      overflow-y: auto;
      font-size: 0.9rem;
      line-height: 1.4;
      margin-bottom: 8px;
      display: grid;
      gap: 4px;
    }

    .chat-line.system { color: #cbd5e1; }
    .chat-line.me { color: #7dd3fc; }
    .chat-line.other { color: #86efac; }

    #chatInputRow { display: none; }
    #chatInputRow.active { display: flex; gap: 8px; }

    #chatInput {
      background: rgba(2, 6, 23, 0.9);
      border: 1px solid var(--line);
      color: var(--text);
      flex: 1;
      padding: 8px;
      border-radius: 8px;
    }

    #topRight {
      top: 12px;
      right: 12px;
      min-width: 250px;
      font-size: 0.9rem;
      color: #dbeafe;
    }

    #crosshair {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 10px;
      height: 10px;
      margin-left: -5px;
      margin-top: -5px;
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: 50%;
    }

    .hint { color: #bae6fd; font-size: 0.85rem; }
  </style>
</head>
<body>
  <section id="loginScreen" class="screen">
    <div class="card">
      <h1>ステップ2: Slime Flat World</h1>
      <p>ユーザー名でログインしてください。</p>
      <div class="row">
        <input id="usernameInput" type="text" maxlength="24" placeholder="ユーザー名" />
        <button id="loginBtn">ログイン</button>
      </div>
      <div id="loginStatus" class="status"></div>
    </div>
  </section>

  <section id="menuScreen" class="screen hidden">
    <div class="card">
      <h2>モード選択</h2>
      <p>フラット（平原）モードのみ選択できます。</p>
      <div class="row">
        <select id="modeSelect" disabled>
          <option value="flat" selected>フラット（平原）</option>
        </select>
      </div>
      <div class="row">
        <button id="quickPlayBtn">クイックプレイ（自動接続）</button>
        <button id="soloBtn" class="sub-btn">シングルで開始</button>
      </div>
      <div class="row">
        <input id="roomInput" type="text" placeholder="部屋番号（例: 1234）" />
        <button id="joinRoomBtn">部屋番号で入室</button>
      </div>
      <p class="hint">接続できなくてもゲーム開始できます。誰かが入室すると自動で同期します。</p>
      <div id="menuStatus" class="status"></div>
    </div>
  </section>

  <div id="gameRoot" class="hidden"></div>

  <div id="hud" class="hidden">
    <div id="chatPanel" class="panel">
      <div id="chatLog"></div>
      <div id="chatInputRow">
        <input id="chatInput" type="text" maxlength="220" placeholder="メッセージを入力してEnterで送信" />
      </div>
      <div class="hint">T または Enter でチャット入力</div>
    </div>

    <div id="topRight" class="panel">
      <div><strong id="nameLabel"></strong></div>
      <div>接続ID: <span id="peerIdLabel">-</span></div>
      <div>接続数: <span id="peersCount">0</span></div>
      <div id="netState">オフライン（シングル）</div>
      <div class="hint">移動: WASD / 矢印・ジャンプ: Space</div>
    </div>

    <div id="crosshair"></div>
  </div>

  <script src="https://unpkg.com/peerjs@1.5.5/dist/peerjs.min.js"></script>
  <script src="https://unpkg.com/three@0.161.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/cannon@0.6.2/build/cannon.min.js"></script>
  <script>
    // ---------- DOM ----------
    const loginScreen = document.getElementById('loginScreen');
    const menuScreen = document.getElementById('menuScreen');
    const gameRoot = document.getElementById('gameRoot');
    const hud = document.getElementById('hud');

    const usernameInput = document.getElementById('usernameInput');
    const loginBtn = document.getElementById('loginBtn');
    const loginStatus = document.getElementById('loginStatus');

    const quickPlayBtn = document.getElementById('quickPlayBtn');
    const joinRoomBtn = document.getElementById('joinRoomBtn');
    const soloBtn = document.getElementById('soloBtn');
    const roomInput = document.getElementById('roomInput');
    const menuStatus = document.getElementById('menuStatus');

    const chatLog = document.getElementById('chatLog');
    const chatInput = document.getElementById('chatInput');
    const chatInputRow = document.getElementById('chatInputRow');
    const nameLabel = document.getElementById('nameLabel');
    const peerIdLabel = document.getElementById('peerIdLabel');
    const peersCount = document.getElementById('peersCount');
    const netState = document.getElementById('netState');

    // ---------- state ----------
    const state = {
      username: '',
      sceneReady: false,
      networkMode: 'solo',
      room: '',
      peer: null,
      peerId: '',
      connections: new Map(),
      remotePlayers: new Map(),
      isChatTyping: false,
      keys: {},
      canJump: false,
      localScale: new THREE.Vector3(1, 1, 1),
      squash: 0,
      lastSyncAt: 0,
    };

    // ---------- helpers ----------
    function setStatus(el, text, warn = false) {
      el.textContent = text;
      el.style.color = warn ? 'var(--warn)' : 'var(--muted)';
    }

    function addChatLine(kind, text) {
      const div = document.createElement('div');
      div.className = `chat-line ${kind}`;
      div.textContent = text;
      chatLog.appendChild(div);
      chatLog.scrollTop = chatLog.scrollHeight;
      if (chatLog.childElementCount > 120) {
        chatLog.removeChild(chatLog.firstChild);
      }
    }

    function roomHostId(room) {
      return `flat-room-${room}`.replace(/[^a-zA-Z0-9\-]/g, '').slice(0, 45) || 'flat-room-default';
    }

    function updateNetworkUI() {
      peerIdLabel.textContent = state.peerId || '-';
      peersCount.textContent = String(state.connections.size);
      const modeLabel = state.networkMode === 'solo' ? 'オフライン（シングル）' : `オンライン (${state.room})`;
      netState.textContent = modeLabel;
    }

    // ---------- PeerJS ----------
    function attachConnection(conn) {
      state.connections.set(conn.peer, conn);
      updateNetworkUI();

      conn.on('open', () => {
        addChatLine('system', `接続: ${conn.peer}`);
        conn.send({
          type: 'hello',
          name: state.username,
          id: state.peerId,
        });
      });

      conn.on('data', (msg) => {
        if (!msg || typeof msg !== 'object') return;

        if (msg.type === 'hello') {
          addChatLine('system', `${msg.name || 'Player'} が参加しました`);
        }

        if (msg.type === 'chat') {
          addChatLine('other', `${msg.name || 'Player'}: ${msg.text || ''}`);
        }

        if (msg.type === 'state') {
          applyRemoteState(conn.peer, msg);
        }
      });

      conn.on('close', () => {
        state.connections.delete(conn.peer);
        removeRemote(conn.peer);
        updateNetworkUI();
        addChatLine('system', `切断: ${conn.peer}`);
      });

      conn.on('error', (e) => {
        addChatLine('system', `接続エラー: ${e.message || e}`);
      });
    }

    function createPeer(desiredId) {
      return new Promise((resolve, reject) => {
        const peer = desiredId ? new Peer(desiredId) : new Peer();
        let opened = false;

        peer.on('open', (id) => {
          opened = true;
          resolve({ peer, id });
        });

        peer.on('connection', (conn) => {
          attachConnection(conn);
        });

        peer.on('error', (err) => {
          if (!opened) {
            reject(err);
          } else {
            addChatLine('system', `Peerエラー: ${err.type || err.message || err}`);
          }
        });
      });
    }

    async function setupNetworking(mode, room) {
      state.networkMode = mode;
      state.room = room || '';

      if (mode === 'solo') {
        updateNetworkUI();
        return;
      }

      const hostId = roomHostId(room);

      try {
        const host = await createPeer(hostId);
        state.peer = host.peer;
        state.peerId = host.id;
        addChatLine('system', `あなたはホストです。部屋: ${room}`);
      } catch (err) {
        if (err.type === 'unavailable-id') {
          const client = await createPeer();
          state.peer = client.peer;
          state.peerId = client.id;
          const conn = state.peer.connect(hostId, { reliable: true });
          attachConnection(conn);
          addChatLine('system', `部屋 ${room} に接続を試行中...`);
        } else {
          addChatLine('system', `ネットワーク初期化失敗: ${err.type || err.message || err}`);
          addChatLine('system', 'シングルプレイで開始します。');
          state.networkMode = 'solo';
        }
      }

      updateNetworkUI();
    }

    function broadcast(payload) {
      for (const [, conn] of state.connections) {
        if (conn.open) conn.send(payload);
      }
    }

    // ---------- 3D / Physics ----------
    let scene, camera, renderer, world;
    let slimeMesh, slimeBody;
    let floorMesh;
    const remoteGroup = new THREE.Group();

    function createSlimeMaterial() {
      return new THREE.MeshStandardMaterial({
        color: 0x5eead4,
        metalness: 0.45,
        roughness: 0.18,
        transparent: true,
        opacity: 0.72,
        envMapIntensity: 1.0,
      });
    }

    function initScene() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x87ceeb);
      scene.fog = new THREE.Fog(0x9bd7ff, 90, 320);

      camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 6, 10);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      gameRoot.appendChild(renderer.domElement);

      const hemi = new THREE.HemisphereLight(0xffffff, 0x88aaff, 0.95);
      scene.add(hemi);

      const dir = new THREE.DirectionalLight(0xffffff, 1.05);
      dir.position.set(6, 14, 4);
      scene.add(dir);

      const groundGeo = new THREE.PlaneGeometry(1200, 1200, 1, 1);
      const groundMat = new THREE.MeshStandardMaterial({ color: 0x6ee7b7, roughness: 0.95, metalness: 0.02 });
      floorMesh = new THREE.Mesh(groundGeo, groundMat);
      floorMesh.rotation.x = -Math.PI / 2;
      floorMesh.position.y = 0;
      scene.add(floorMesh);

      slimeMesh = new THREE.Mesh(new THREE.SphereGeometry(1, 32, 32), createSlimeMaterial());
      slimeMesh.position.set(0, 2, 0);
      scene.add(slimeMesh);

      scene.add(remoteGroup);

      world = new CANNON.World();
      world.gravity.set(0, -24, 0);
      world.broadphase = new CANNON.NaiveBroadphase();
      world.solver.iterations = 10;

      const groundBody = new CANNON.Body({ mass: 0, shape: new CANNON.Plane() });
      groundBody.quaternion.setFromEuler(-Math.PI / 2, 0, 0);
      world.addBody(groundBody);

      slimeBody = new CANNON.Body({
        mass: 1.2,
        shape: new CANNON.Sphere(1),
        position: new CANNON.Vec3(0, 3.5, 0),
        material: new CANNON.Material('slime')
      });
      slimeBody.linearDamping = 0.25;
      world.addBody(slimeBody);

      window.addEventListener('resize', onResize);
      state.sceneReady = true;
      requestAnimationFrame(loop);
    }

    function onResize() {
      if (!renderer) return;
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function controlStep(dt) {
      if (state.isChatTyping) return;

      const speed = 14;
      const force = new CANNON.Vec3(0, 0, 0);
      const forward = (state.keys['KeyW'] || state.keys['ArrowUp'] ? 1 : 0) - (state.keys['KeyS'] || state.keys['ArrowDown'] ? 1 : 0);
      const strafe = (state.keys['KeyD'] || state.keys['ArrowRight'] ? 1 : 0) - (state.keys['KeyA'] || state.keys['ArrowLeft'] ? 1 : 0);

      force.x = strafe * speed;
      force.z = -forward * speed;
      slimeBody.applyForce(force, slimeBody.position);

      const nearGround = slimeBody.position.y <= 1.05;
      if (nearGround) state.canJump = true;

      if (state.keys['Space'] && state.canJump) {
        slimeBody.velocity.y = 9.8;
        state.canJump = false;
        state.squash = Math.max(state.squash, 0.22);
      }

      const horizontalSpeed = Math.hypot(slimeBody.velocity.x, slimeBody.velocity.z);
      const wobble = Math.min(0.22, horizontalSpeed * 0.014) + state.squash;
      const pulse = 0.04 * Math.sin(performance.now() * 0.02);

      const targetY = 1 + wobble * 0.7 + pulse;
      const targetXZ = 1 - wobble * 0.4;
      state.localScale.x += (targetXZ - state.localScale.x) * Math.min(1, dt * 12);
      state.localScale.y += (targetY - state.localScale.y) * Math.min(1, dt * 12);
      state.localScale.z += (targetXZ - state.localScale.z) * Math.min(1, dt * 12);
      slimeMesh.scale.copy(state.localScale);

      state.squash *= Math.max(0, 1 - dt * 6.5);

      if (nearGround && Math.abs(slimeBody.velocity.y) < 0.6) {
        state.squash = Math.max(state.squash, 0.08);
      }
    }

    function updateCamera() {
      const p = slimeMesh.position;
      const desired = new THREE.Vector3(p.x + 0.1, p.y + 4.6, p.z + 8.4);
      camera.position.lerp(desired, 0.07);
      camera.lookAt(p.x, p.y + 0.7, p.z);
    }

    function applyRemoteState(peerId, data) {
      if (!state.sceneReady) return;
      let remote = state.remotePlayers.get(peerId);
      if (!remote) {
        const mesh = new THREE.Mesh(new THREE.SphereGeometry(1, 24, 24), new THREE.MeshStandardMaterial({
          color: 0x60a5fa,
          metalness: 0.38,
          roughness: 0.24,
          transparent: true,
          opacity: 0.67,
        }));
        remoteGroup.add(mesh);
        remote = { mesh, name: data.name || 'Player' };
        state.remotePlayers.set(peerId, remote);
      }

      remote.mesh.position.set(data.x || 0, data.y || 2, data.z || 0);
      remote.mesh.scale.set(data.sx || 1, data.sy || 1, data.sz || 1);
    }

    function removeRemote(peerId) {
      const remote = state.remotePlayers.get(peerId);
      if (!remote) return;
      remoteGroup.remove(remote.mesh);
      remote.mesh.geometry.dispose();
      remote.mesh.material.dispose();
      state.remotePlayers.delete(peerId);
    }

    function syncState() {
      if (state.networkMode === 'solo') return;
      const now = performance.now();
      if (now - state.lastSyncAt < 90) return;
      state.lastSyncAt = now;

      broadcast({
        type: 'state',
        name: state.username,
        x: slimeMesh.position.x,
        y: slimeMesh.position.y,
        z: slimeMesh.position.z,
        sx: slimeMesh.scale.x,
        sy: slimeMesh.scale.y,
        sz: slimeMesh.scale.z,
      });
    }

    let prevTime = performance.now();
    function loop(now) {
      if (!state.sceneReady) return;
      const dt = Math.min(0.05, (now - prevTime) / 1000);
      prevTime = now;

      controlStep(dt);
      world.step(1 / 60, dt, 3);

      slimeMesh.position.set(slimeBody.position.x, slimeBody.position.y, slimeBody.position.z);
      updateCamera();
      syncState();

      renderer.render(scene, camera);
      requestAnimationFrame(loop);
    }

    // ---------- chat ----------
    function toggleChatInput(show) {
      state.isChatTyping = show;
      chatInputRow.classList.toggle('active', show);
      if (show) {
        chatInput.value = '';
        chatInput.focus();
      } else {
        chatInput.blur();
      }
    }

    function sendChatMessage(text) {
      const message = text.trim();
      if (!message) return;
      addChatLine('me', `${state.username}: ${message}`);
      broadcast({ type: 'chat', name: state.username, text: message });
    }

    // ---------- flow ----------
    async function startGame(networkMode, room) {
      loginScreen.classList.add('hidden');
      menuScreen.classList.add('hidden');
      gameRoot.classList.remove('hidden');
      hud.classList.remove('hidden');
      nameLabel.textContent = `Player: ${state.username}`;

      if (!state.sceneReady) {
        initScene();
      }

      addChatLine('system', `${state.username} がゲームに参加しました`);
      await setupNetworking(networkMode, room);
      updateNetworkUI();
    }

    loginBtn.addEventListener('click', () => {
      const name = usernameInput.value.trim();
      if (!name) {
        setStatus(loginStatus, 'ユーザー名を入力してください', true);
        return;
      }
      state.username = name;
      setStatus(loginStatus, '');
      loginScreen.classList.add('hidden');
      menuScreen.classList.remove('hidden');
      setStatus(menuStatus, 'モードを選んで開始してください');
    });

    quickPlayBtn.addEventListener('click', async () => {
      setStatus(menuStatus, 'クイックプレイを開始します...');
      await startGame('online', 'quick-flat');
    });

    joinRoomBtn.addEventListener('click', async () => {
      const room = roomInput.value.trim();
      if (!room) {
        setStatus(menuStatus, '部屋番号を入力してください', true);
        return;
      }
      setStatus(menuStatus, `部屋 ${room} へ入室します...`);
      await startGame('online', room);
    });

    soloBtn.addEventListener('click', async () => {
      setStatus(menuStatus, 'シングルプレイで開始します');
      await startGame('solo', 'solo');
    });

    document.addEventListener('keydown', (e) => {
      if (!state.sceneReady) return;

      if ((e.code === 'KeyT' || e.code === 'Enter') && !state.isChatTyping) {
        e.preventDefault();
        toggleChatInput(true);
        return;
      }

      if (state.isChatTyping && e.code === 'Enter') {
        e.preventDefault();
        sendChatMessage(chatInput.value);
        toggleChatInput(false);
        return;
      }

      if (state.isChatTyping && e.code === 'Escape') {
        e.preventDefault();
        toggleChatInput(false);
        return;
      }

      state.keys[e.code] = true;
    });

    document.addEventListener('keyup', (e) => {
      state.keys[e.code] = false;
    });

    chatInput.addEventListener('keydown', (e) => {
      if (e.code === 'Enter') {
        e.preventDefault();
        sendChatMessage(chatInput.value);
        toggleChatInput(false);
      }
    });

    usernameInput.addEventListener('keydown', (e) => {
      if (e.code === 'Enter') loginBtn.click();
    });
  </script>
</body>
</html>
