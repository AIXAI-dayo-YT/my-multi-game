<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slime Playground - Step 3</title>
  <style>
    :root {
      --panel: rgba(10, 14, 28, 0.82);
      --line: rgba(148, 163, 184, 0.35);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --warn: #f59e0b;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Inter", "Noto Sans JP", sans-serif;
      background: radial-gradient(circle at top, #1e293b 0%, #020617 80%);
      color: var(--text);
    }
    .hidden { display: none !important; }
    .screen {
      position: fixed; inset: 0; z-index: 20;
      display: grid; place-items: center; padding: 18px;
    }
    .card {
      width: min(760px, 100%); padding: 20px;
      border-radius: 16px; border: 1px solid var(--line);
      background: var(--panel); backdrop-filter: blur(7px);
      box-shadow: 0 14px 34px rgba(0,0,0,0.35);
    }
    .row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
    h1,h2 { margin: 0 0 10px; }
    p { margin: 0 0 12px; color: var(--muted); }
    input,button,select {
      border-radius: 10px; border: 1px solid var(--line);
      padding: 10px 12px; font: inherit;
    }
    input,select { flex: 1; min-width: 180px; background: rgba(15,23,42,.65); color: var(--text); }
    button { border: none; background: #0ea5e9; color: #06263a; font-weight: 700; cursor: pointer; }
    button:hover { filter: brightness(1.08); }
    button:disabled { opacity: .45; cursor: not-allowed; }
    .sub-btn { background: #64748b; color: #f8fafc; }
    .status { min-height: 1.4em; color: var(--muted); font-size: .95rem; }

    #gameRoot { position: fixed; inset: 0; background: #87ceeb; }
    #hud { position: fixed; inset: 0; pointer-events: none; z-index: 10; }
    .panel {
      position: absolute; border-radius: 10px; padding: 10px;
      border: 1px solid var(--line); background: rgba(2,6,23,.78);
      backdrop-filter: blur(4px);
    }
    #chatPanel {
      top: 12px; left: 12px; width: min(470px, calc(100vw - 24px));
      background: rgba(2,6,23,.86); pointer-events: auto;
    }
    #chatLog { max-height: 220px; overflow-y: auto; font-size: .9rem; line-height: 1.45; margin-bottom: 8px; display: grid; gap: 4px; }
    .chat-line.system { color: #cbd5e1; }
    .chat-line.me { color: #7dd3fc; }
    .chat-line.other { color: #86efac; }
    #chatInputRow { display: none; }
    #chatInputRow.active { display: flex; gap: 8px; }
    #chatInput { flex: 1; color: var(--text); background: rgba(2,6,23,.96); border: 1px solid var(--line); border-radius: 8px; padding: 8px; }

    #topRight { top: 12px; right: 12px; min-width: 280px; color: #dbeafe; font-size: .9rem; }
    #exitBtn {
      pointer-events: auto;
      position: absolute; right: 12px; bottom: 12px;
      background: #ef4444; color: #fff; border: 0; border-radius: 10px;
      padding: 10px 14px; font-weight: 700; cursor: pointer;
    }
    #exitBtn:hover { filter: brightness(1.07); }
    #crosshair {
      position: absolute; top: 50%; left: 50%; width: 10px; height: 10px;
      margin-left: -5px; margin-top: -5px; border: 1px solid rgba(255,255,255,.8); border-radius: 50%;
    }
    .hint { color: #bae6fd; font-size: .85rem; }
  </style>
</head>
<body>
  <section id="loginScreen" class="screen">
    <div class="card">
      <h1>ステップ3: 究極スライム体験</h1>
      <p>アカウントでログインしてください（同名登録不可）。</p>
      <div class="row">
        <input id="usernameInput" type="text" maxlength="24" placeholder="ユーザー名" autocomplete="username" />
        <input id="passwordInput" type="password" maxlength="64" placeholder="パスワード" autocomplete="current-password" />
      </div>
      <div class="row">
        <button id="loginBtn">ログイン</button>
        <button id="registerBtn" class="sub-btn">新規登録</button>
      </div>
      <div id="libStatus" class="status">ライブラリを読み込み中...</div>
      <p class="hint">※ LocalStorage保存: アップデート後も同じアカウントでログインできます。</p>
      <div id="loginStatus" class="status"></div>
    </div>
  </section>

  <section id="menuScreen" class="screen hidden">
    <div class="card">
      <h2>モード選択</h2>
      <p>フラット（平原）モードのみ選択できます。</p>
      <div class="row">
        <select disabled><option>フラット（平原）</option></select>
      </div>
      <div class="row">
        <button id="quickPlayBtn">クイックプレイ（自動接続）</button>
        <button id="soloBtn" class="sub-btn">シングルで開始</button>
      </div>
      <div class="row">
        <input id="roomInput" type="text" placeholder="部屋番号（例: 1234）" />
        <button id="joinRoomBtn">部屋番号で入室</button>
      </div>
      <div id="menuStatus" class="status"></div>
    </div>
  </section>

  <div id="gameRoot" class="hidden"></div>
  <div id="hud" class="hidden">
    <div id="chatPanel" class="panel">
      <div id="chatLog"></div>
      <div id="chatInputRow"><input id="chatInput" type="text" maxlength="220" placeholder="Enter送信 / Esc閉じる" /></div>
      <div class="hint">T または Enter でチャット入力</div>
    </div>
    <div id="topRight" class="panel">
      <div><strong id="nameLabel"></strong></div>
      <div>接続ID: <span id="peerIdLabel">-</span></div>
      <div>接続数: <span id="peersCount">0</span></div>
      <div id="netState">オフライン（シングル）</div>
      <div class="hint">移動: WASD/矢印 ・ ジャンプ: Space ・ 視点: マウス</div>
    </div>
    <button id="exitBtn">タイトルへ戻る（退出）</button>
    <div id="crosshair"></div>
  </div>

  <script>
    const ACCOUNT_KEY = 'slime_accounts_v2';
    const LAST_USER_KEY = 'slime_last_user_v2';

    const loginScreen = document.getElementById('loginScreen');
    const menuScreen = document.getElementById('menuScreen');
    const gameRoot = document.getElementById('gameRoot');
    const hud = document.getElementById('hud');
    const usernameInput = document.getElementById('usernameInput');
    const passwordInput = document.getElementById('passwordInput');
    const loginBtn = document.getElementById('loginBtn');
    const registerBtn = document.getElementById('registerBtn');
    const loginStatus = document.getElementById('loginStatus');
    const libStatus = document.getElementById('libStatus');
    const quickPlayBtn = document.getElementById('quickPlayBtn');
    const joinRoomBtn = document.getElementById('joinRoomBtn');
    const soloBtn = document.getElementById('soloBtn');
    const roomInput = document.getElementById('roomInput');
    const menuStatus = document.getElementById('menuStatus');
    const chatLog = document.getElementById('chatLog');
    const chatInput = document.getElementById('chatInput');
    const chatInputRow = document.getElementById('chatInputRow');
    const nameLabel = document.getElementById('nameLabel');
    const peerIdLabel = document.getElementById('peerIdLabel');
    const peersCount = document.getElementById('peersCount');
    const netState = document.getElementById('netState');
    const exitBtn = document.getElementById('exitBtn');

    const state = {
      libsReady: false,
      username: '',
      sceneReady: false,
      networkMode: 'solo',
      room: '',
      peer: null,
      peerId: '',
      connections: new Map(),
      remotePlayers: new Map(),
      isChatTyping: false,
      pointerLocked: false,
      keys: {},
      canJump: false,
      localScale: { x: 1, y: 1, z: 1 },
      squash: 0,
      jitter: 0,
      jumpCharge: 0,
      wasSpaceDown: false,
      lastSyncAt: 0,
      cameraYaw: 0,
      cameraPitch: -0.25,
    };

    let THREE_LIB = null;
    let CANNON_LIB = null;
    let PeerCtor = null;

    function setStatus(el, text, warn = false) {
      el.textContent = text;
      el.style.color = warn ? 'var(--warn)' : 'var(--muted)';
    }

    function addChatLine(kind, text) {
      const div = document.createElement('div');
      div.className = `chat-line ${kind}`;
      div.textContent = text;
      chatLog.appendChild(div);
      chatLog.scrollTop = chatLog.scrollHeight;
      if (chatLog.childElementCount > 120) chatLog.removeChild(chatLog.firstChild);
    }

    function loadAccounts() {
      try {
        const parsed = JSON.parse(localStorage.getItem(ACCOUNT_KEY) || '{}');
        return parsed && typeof parsed === 'object' ? parsed : {};
      } catch {
        return {};
      }
    }

    function saveAccounts(accounts) { localStorage.setItem(ACCOUNT_KEY, JSON.stringify(accounts)); }
    async function sha256(text) {
      const bytes = new TextEncoder().encode(text);
      const hash = await crypto.subtle.digest('SHA-256', bytes);
      return [...new Uint8Array(hash)].map(v => v.toString(16).padStart(2, '0')).join('');
    }
    const normalizeUsername = (name) => name.trim().toLowerCase();

    async function registerAccount(username, password) {
      const key = normalizeUsername(username);
      const accounts = loadAccounts();
      if (accounts[key]) throw new Error('そのユーザー名は既に使われています');
      const salt = crypto.randomUUID();
      accounts[key] = { username, salt, passHash: await sha256(`${salt}:${password}`), createdAt: new Date().toISOString() };
      saveAccounts(accounts);
      localStorage.setItem(LAST_USER_KEY, username);
      return username;
    }

    async function loginAccount(username, password) {
      const account = loadAccounts()[normalizeUsername(username)];
      if (!account) throw new Error('アカウントが存在しません。新規登録してください');
      if (await sha256(`${account.salt}:${password}`) !== account.passHash) throw new Error('パスワードが違います');
      localStorage.setItem(LAST_USER_KEY, account.username);
      return account.username;
    }

    const roomHostId = (room) => `flat-room-${room}`.replace(/[^a-zA-Z0-9\-]/g, '').slice(0, 45) || 'flat-room-default';
    function updateNetworkUI() {
      peerIdLabel.textContent = state.peerId || '-';
      peersCount.textContent = String(state.connections.size);
      netState.textContent = state.networkMode === 'solo' ? 'オフライン（シングル）' : `オンライン (${state.room})`;
    }

    function attachConnection(conn) {
      state.connections.set(conn.peer, conn);
      updateNetworkUI();

      conn.on('open', () => {
        addChatLine('system', `接続: ${conn.peer}`);
        conn.send({ type: 'hello', name: state.username, id: state.peerId });
      });

      conn.on('data', (msg) => {
        if (!msg || typeof msg !== 'object') return;
        if (msg.type === 'hello') addChatLine('system', `${msg.name || 'Player'} が参加しました`);
        if (msg.type === 'chat') addChatLine('other', `${msg.name || 'Player'}: ${msg.text || ''}`);
        if (msg.type === 'state') applyRemoteState(conn.peer, msg);
      });

      conn.on('close', () => {
        state.connections.delete(conn.peer);
        removeRemote(conn.peer);
        updateNetworkUI();
      });
    }

    function createPeer(desiredId) {
      return new Promise((resolve, reject) => {
        const peer = desiredId ? new PeerCtor(desiredId) : new PeerCtor();
        let opened = false;
        peer.on('open', (id) => { opened = true; resolve({ peer, id }); });
        peer.on('connection', (conn) => attachConnection(conn));
        peer.on('error', (err) => { if (!opened) reject(err); else console.error(err); });
      });
    }

    async function setupNetworking(mode, room) {
      state.networkMode = mode;
      state.room = room || '';
      if (mode === 'solo') return updateNetworkUI();

      const hostId = roomHostId(room);
      try {
        const host = await createPeer(hostId);
        state.peer = host.peer;
        state.peerId = host.id;
        addChatLine('system', `あなたはホストです。部屋: ${room}`);
      } catch (err) {
        if (err.type === 'unavailable-id') {
          const client = await createPeer();
          state.peer = client.peer;
          state.peerId = client.id;
          attachConnection(state.peer.connect(hostId, { reliable: true }));
          addChatLine('system', `部屋 ${room} に接続を試行中...`);
        } else {
          addChatLine('system', `ネットワーク初期化失敗: ${err.message || err}`);
          state.networkMode = 'solo';
        }
      }
      updateNetworkUI();
    }

    const broadcast = (payload) => {
      for (const [, conn] of state.connections) if (conn.open) conn.send(payload);
    };

    function delay(ms) { return new Promise((r) => setTimeout(r, ms)); }
    function waitForLibraries(timeoutMs = 15000) {
      return new Promise((resolve, reject) => {
        const start = performance.now();
        const timer = setInterval(() => {
          if (THREE_LIB && CANNON_LIB && PeerCtor) {
            clearInterval(timer); resolve();
          } else if (performance.now() - start > timeoutMs) {
            clearInterval(timer); reject(new Error('ライブラリ読み込みタイムアウト'));
          }
        }, 100);
      });
    }

    async function importModuleFromList(libraryName, urls, retryCount = 1, retryDelayMs = 350) {
      const allErrors = [];
      for (const url of urls) {
        for (let attempt = 1; attempt <= retryCount + 1; attempt++) {
          try {
            const mod = await import(url);
            console.info(`[library] ${libraryName} imported from: ${url} (attempt ${attempt})`);
            return { url, mod };
          } catch (error) {
            allErrors.push({ url, attempt, error });
            console.error(`[library] ${libraryName} load error`, { library: libraryName, url, attempt, error });
            console.error('Network Error Details:', error);
            if (attempt <= retryCount) await delay(retryDelayMs * attempt);
          }
        }
      }
      console.error(`[library] ${libraryName} failed on all CDNs`, allErrors);
      throw new Error(`${libraryName} の読み込みに失敗しました（全CDN / 全リトライ失敗）`);
    }

    async function ensureLibrariesLoaded() {
      try {
        // 既知の相性問題対策: Skypackは最後に回す
        const peer = await importModuleFromList('PeerJS', [
          'https://esm.sh/peerjs@1.5.5',
          'https://cdn.jsdelivr.net/npm/peerjs@1.5.5/+esm',
          'https://cdn.skypack.dev/peerjs@1.5.5'
        ], 1, 450);
        PeerCtor = peer.mod.Peer || peer.mod.default?.Peer || peer.mod.default;

        const three = await importModuleFromList('Three.js', [
          'https://esm.sh/three@0.161.0',
          'https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js',
          'https://cdn.skypack.dev/three@0.161.0'
        ], 1, 450);
        THREE_LIB = three.mod;

        const cannon = await importModuleFromList('Cannon.js', [
          'https://esm.sh/cannon-es@0.20.0',
          'https://cdn.skypack.dev/cannon-es@0.20.0'
        ], 1, 450);
        CANNON_LIB = cannon.mod;

        await waitForLibraries();
        state.libsReady = true;
        setStatus(libStatus, 'ライブラリ読み込み完了');
      } catch (error) {
        const missing = [];
        if (!PeerCtor) missing.push('PeerJS');
        if (!THREE_LIB) missing.push('Three.js');
        if (!CANNON_LIB) missing.push('Cannon.js');
        console.error('[library] initialization stopped. Missing libraries:', missing);
        console.error('Network Error Details:', error);
        throw error;
      }
    }

    let scene, camera, renderer, world;
    let slimeMesh, slimeShellMesh, slimeBody, remoteGroup, decorGroup;
    let softBody = null;
    let localSlimeUniforms = null;

    function createJellyMaterial(color = 0x5eead4) {
      return new THREE_LIB.MeshPhysicalMaterial({
        color,
        metalness: 0.05,
        roughness: 0.24,
        transmission: 0.52,
        transparent: true,
        opacity: 0.82,
        thickness: 1.8,
        ior: 1.38,
        clearcoat: 1,
        clearcoatRoughness: 0.1,
        specularIntensity: 0.7,
        reflectivity: 0.7,
      });
    }

    function attachJitterShader(mat) {
      const uniforms = {
        uTime: { value: 0 },
        uJitter: { value: 0 },
        uSquash: { value: 0 },
      };
      mat.onBeforeCompile = (shader) => {
        shader.uniforms.uTime = uniforms.uTime;
        shader.uniforms.uJitter = uniforms.uJitter;
        shader.uniforms.uSquash = uniforms.uSquash;
        shader.vertexShader = shader.vertexShader.replace(
          '#include <common>',
          `#include <common>
          uniform float uTime;
          uniform float uJitter;
          uniform float uSquash;`
        );
        shader.vertexShader = shader.vertexShader.replace(
          '#include <begin_vertex>',
          `
          vec3 transformed = vec3(position);
          float wobble = sin((position.y * 14.0) + uTime * 18.0) * uJitter * 0.14;
          transformed += normal * wobble;
          transformed.y -= uSquash * (1.0 - abs(normal.y)) * 0.32;
          `
        );
      };
      mat.needsUpdate = true;
      return uniforms;
    }

    function initSoftBody(mesh) {
      const geo = mesh.geometry;
      const pos = geo.attributes.position;
      const nodes = [];
      for (let i = 0; i < pos.count; i++) {
        const p = new THREE_LIB.Vector3(pos.getX(i), pos.getY(i), pos.getZ(i));
        nodes.push({
          rest: p.clone(),
          pos: p.clone(),
          vel: new THREE_LIB.Vector3(),
          mass: 1,
        });
      }

      const springs = [];
      const idx = geo.index ? geo.index.array : null;
      const edges = new Set();
      const addEdge = (a, b) => {
        const key = a < b ? `${a}-${b}` : `${b}-${a}`;
        if (edges.has(key)) return;
        edges.add(key);
        const restLength = nodes[a].rest.distanceTo(nodes[b].rest);
        springs.push({ i: a, j: b, restLength, stiffness: 22 });
      };
      if (idx) {
        for (let i = 0; i < idx.length; i += 3) {
          addEdge(idx[i], idx[i + 1]);
          addEdge(idx[i + 1], idx[i + 2]);
          addEdge(idx[i + 2], idx[i]);
        }
      }

      return { geo, nodes, springs };
    }

    function stepSoftBody(dt, speed, impact, nearGround) {
      if (!softBody) return;
      const dt60 = Math.min(1.8, dt * 60);
      const excite = Math.min(1.2, speed * 0.03 + impact * 2.2);

      for (const n of softBody.nodes) {
        const toRest = n.rest.clone().sub(n.pos);
        n.vel.addScaledVector(toRest, 0.12 * dt60);
        if (nearGround) n.vel.y -= 0.015 * dt60;
        n.vel.x += (Math.random() - 0.5) * 0.012 * excite;
        n.vel.z += (Math.random() - 0.5) * 0.012 * excite;
      }

      for (const s of softBody.springs) {
        const a = softBody.nodes[s.i], b = softBody.nodes[s.j];
        const d = b.pos.clone().sub(a.pos);
        const len = d.length() || 0.0001;
        const stretch = (len - s.restLength);
        const force = d.multiplyScalar((stretch * s.stiffness * dt60) / len);
        a.vel.add(force.clone().multiplyScalar(1 / a.mass));
        b.vel.add(force.clone().multiplyScalar(-1 / b.mass));
      }

      for (const n of softBody.nodes) {
        n.vel.multiplyScalar(0.87);
        n.pos.addScaledVector(n.vel, 0.18 * dt60);
        const maxR = n.rest.length() * 1.45;
        if (n.pos.length() > maxR) n.pos.setLength(maxR);
      }

      const pos = softBody.geo.attributes.position;
      for (let i = 0; i < softBody.nodes.length; i++) {
        const p = softBody.nodes[i].pos;
        pos.setXYZ(i, p.x, p.y, p.z);
      }
      pos.needsUpdate = true;
      softBody.geo.computeVertexNormals();
    }

    function hashNoise(x, z) {
      return (Math.sin(x * 127.1 + z * 311.7) * 43758.5453) % 1;
    }
    function smoothNoise(x, z) {
      const xi = Math.floor(x), zi = Math.floor(z);
      const xf = x - xi, zf = z - zi;
      const s = (t) => t * t * (3 - 2 * t);
      const n00 = hashNoise(xi, zi), n10 = hashNoise(xi + 1, zi);
      const n01 = hashNoise(xi, zi + 1), n11 = hashNoise(xi + 1, zi + 1);
      const u = s(xf), v = s(zf);
      return (n00 * (1 - u) + n10 * u) * (1 - v) + (n01 * (1 - u) + n11 * u) * v;
    }
    function fbm(x, z) {
      let sum = 0, amp = 1, freq = 0.015;
      for (let i = 0; i < 4; i++) {
        sum += smoothNoise(x * freq, z * freq) * amp;
        amp *= 0.5; freq *= 2;
      }
      return sum;
    }

    function addDecorations() {
      const THREE = THREE_LIB;
      decorGroup = new THREE.Group();
      scene.add(decorGroup);

      const rand = (a, b) => a + Math.random() * (b - a);
      const treeCount = 55;
      const createBranch = (group, depth, len, radius, parentY, rotX, rotZ) => {
        const b = new THREE.Mesh(
          new THREE.CylinderGeometry(radius * 0.72, radius, len, 7),
          new THREE.MeshStandardMaterial({ color: 0x6a4a2c, roughness: 0.96, metalness: 0.01 })
        );
        b.position.y = parentY + len * 0.5;
        b.rotation.x = rotX;
        b.rotation.z = rotZ;
        group.add(b);
        if (depth <= 0) return;
        const childY = parentY + len * 0.95;
        createBranch(group, depth - 1, len * 0.72, radius * 0.72, childY, rotX + rand(0.15, 0.45), rotZ + rand(-0.45, -0.12));
        createBranch(group, depth - 1, len * 0.72, radius * 0.72, childY, rotX + rand(0.18, 0.5), rotZ + rand(0.12, 0.45));
      };
      for (let i = 0; i < treeCount; i++) {
        const g = new THREE.Group();
        const x = rand(-220, 220);
        const z = rand(-220, 220);
        const baseH = rand(2.6, 4.2);
        createBranch(g, 2, baseH, rand(0.24, 0.34), 0, 0, 0);
        for (let l = 0; l < 4; l++) {
          const leaf = new THREE.Mesh(
            new THREE.IcosahedronGeometry(rand(0.45, 0.9), 0),
            new THREE.MeshStandardMaterial({ color: [0x2f9e44, 0x3fab56, 0x4fbf64][l % 3], roughness: 0.86 })
          );
          leaf.position.set(rand(-0.8, 0.8), baseH + rand(0.2, 1.2), rand(-0.8, 0.8));
          g.add(leaf);
        }
        g.position.set(x, (fbm(x, z) - 0.5) * 3.2, z);
        decorGroup.add(g);
      }

      const flowers = [];
      for (let i = 0; i < 140; i++) {
        const g = new THREE.Group();
        const stem = new THREE.Mesh(
          new THREE.CylinderGeometry(0.02, 0.03, rand(0.45, 0.9), 5),
          new THREE.MeshStandardMaterial({ color: 0x1f9d55 })
        );
        stem.position.y = stem.geometry.parameters.height * 0.5;
        g.add(stem);

        const petalColor = [0xff7eb6, 0xfff3b0, 0xb8f2e6, 0xd0bfff][(Math.random() * 4) | 0];
        const petalMat = new THREE.MeshStandardMaterial({ color: petalColor, roughness: 0.45, metalness: 0.02 });
        for (let p = 0; p < 5; p++) {
          const petal = new THREE.Mesh(new THREE.SphereGeometry(rand(0.05, 0.09), 7, 7), petalMat);
          const ang = (Math.PI * 2 * p) / 5;
          petal.position.set(Math.cos(ang) * 0.06, stem.geometry.parameters.height + 0.03, Math.sin(ang) * 0.06);
          g.add(petal);
        }
        const center = new THREE.Mesh(new THREE.SphereGeometry(0.03, 7, 7), new THREE.MeshStandardMaterial({ color: 0xffdd55 }));
        center.position.y = stem.geometry.parameters.height + 0.03;
        g.add(center);

        const fx = rand(-180, 180), fz = rand(-180, 180);
        g.position.set(fx, (fbm(fx, fz) - 0.5) * 3.2, fz);
        g.userData.baseRot = Math.random() * Math.PI * 2;
        flowers.push(g);
        decorGroup.add(g);
      }
      decorGroup.userData.flowers = flowers;
    }

    async function initScene() {
      await waitForLibraries();
      const THREE = THREE_LIB;
      const CANNON = CANNON_LIB;

      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x8dcfff);
      scene.fog = new THREE.Fog(0x9bd7ff, 120, 420);

      camera = new THREE.PerspectiveCamera(72, window.innerWidth / window.innerHeight, 0.1, 1500);
      camera.position.set(0, 5, 9);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.15;
      gameRoot.appendChild(renderer.domElement);

      scene.add(new THREE.HemisphereLight(0xffffff, 0x7ea5d8, .95));
      const sun = new THREE.DirectionalLight(0xffffff, 1.25);
      sun.position.set(9, 18, 8);
      scene.add(sun);

      const rim = new THREE.PointLight(0x9cd9ff, 0.8, 50);
      rim.position.set(-4, 5, -4);
      scene.add(rim);

      const terrainSize = 360;
      const terrainSegments = 72;
      const terrainGeo = new THREE.PlaneGeometry(terrainSize, terrainSize, terrainSegments, terrainSegments);
      const pos = terrainGeo.attributes.position;
      const colors = [];
      const heights = [];
      for (let z = 0; z <= terrainSegments; z++) {
        heights[z] = [];
        for (let x = 0; x <= terrainSegments; x++) {
          const idx = z * (terrainSegments + 1) + x;
          const vx = pos.getX(idx), vz = pos.getY(idx);
          const h = (fbm(vx, vz) - 0.5) * 3.2;
          pos.setZ(idx, h);
          heights[z][x] = h;
        }
      }
      terrainGeo.computeVertexNormals();
      for (let i = 0; i < pos.count; i++) {
        const y = pos.getZ(i);
        const shade = 0.45 + Math.max(0, Math.min(0.35, (y + 1.6) * 0.09));
        colors.push(0.18 * shade, 0.58 * shade, 0.28 * shade);
      }
      terrainGeo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
      const floor = new THREE.Mesh(
        terrainGeo,
        new THREE.MeshStandardMaterial({ vertexColors: true, roughness: 0.95, metalness: 0.01 })
      );
      floor.rotation.x = -Math.PI / 2;
      scene.add(floor);

      slimeMesh = new THREE.Mesh(new THREE.IcosahedronGeometry(1, 3), createJellyMaterial(0x5eead4));
      slimeMesh.position.set(0, 2, 0);
      localSlimeUniforms = attachJitterShader(slimeMesh.material);
      softBody = initSoftBody(slimeMesh);

      slimeShellMesh = new THREE.Mesh(
        new THREE.SphereGeometry(1.08, 48, 48),
        new THREE.MeshPhysicalMaterial({ color: 0xb7fff7, transmission: 1, thickness: 0.8, transparent: true, opacity: 0.2, roughness: 0.02 })
      );
      slimeMesh.add(slimeShellMesh);
      scene.add(slimeMesh);

      remoteGroup = new THREE.Group();
      scene.add(remoteGroup);
      addDecorations();

      world = new CANNON.World({ gravity: new CANNON.Vec3(0, -24, 0) });
      world.broadphase = new CANNON.NaiveBroadphase();
      world.solver.iterations = 10;

      const groundMaterial = new CANNON.Material('ground');
      const groundShape = new CANNON.Heightfield(heights, { elementSize: terrainSize / terrainSegments });
      const groundBody = new CANNON.Body({ mass: 0, material: groundMaterial });
      groundBody.addShape(groundShape);
      groundBody.position.set(-terrainSize / 2, 0, terrainSize / 2);
      groundBody.quaternion.setFromEuler(-Math.PI / 2, 0, 0);
      world.addBody(groundBody);
      // 安定した当たり判定のため保険としてフラット地面も追加
      const planeBody = new CANNON.Body({ mass: 0, material: groundMaterial, shape: new CANNON.Plane() });
      planeBody.quaternion.setFromEuler(-Math.PI / 2, 0, 0);
      planeBody.position.set(0, -0.2, 0);
      world.addBody(planeBody);

      const slimeMaterial = new CANNON.Material('slime');
      slimeBody = new CANNON.Body({ mass: 1.2, material: slimeMaterial, shape: new CANNON.Sphere(1), position: new CANNON.Vec3(0, 4.8, 0) });
      slimeBody.linearDamping = 0.72;
      slimeBody.angularDamping = 0.88;
      world.addBody(slimeBody);
      world.defaultContactMaterial.friction = 1.15;
      world.defaultContactMaterial.restitution = 0.05;
      world.addContactMaterial(new CANNON.ContactMaterial(slimeMaterial, groundMaterial, { friction: 1.35, restitution: 0.04 }));

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      renderer.domElement.addEventListener('click', () => {
        if (!state.isChatTyping) renderer.domElement.requestPointerLock();
      });

      document.addEventListener('pointerlockchange', () => {
        state.pointerLocked = document.pointerLockElement === renderer.domElement;
      });

      document.addEventListener('mousemove', (e) => {
        if (!state.pointerLocked || state.isChatTyping) return;
        state.cameraYaw -= e.movementX * 0.0023;
        state.cameraPitch = Math.max(-1.1, Math.min(0.55, state.cameraPitch - e.movementY * 0.0019));
      });

      state.sceneReady = true;
      requestAnimationFrame(loop);
    }

    function controlStep(dt, nowMs) {
      if (state.isChatTyping) return;
      const CANNON = CANNON_LIB;
      const forwardKey = (state.keys['KeyW'] || state.keys['ArrowUp'] ? 1 : 0) - (state.keys['KeyS'] || state.keys['ArrowDown'] ? 1 : 0);
      const strafeKey = (state.keys['KeyD'] || state.keys['ArrowRight'] ? 1 : 0) - (state.keys['KeyA'] || state.keys['ArrowLeft'] ? 1 : 0);

      const speed = 22;
      const force = new CANNON.Vec3(0, 0, 0);
      const sin = Math.sin(state.cameraYaw), cos = Math.cos(state.cameraYaw);
      const dirX = forwardKey * sin + strafeKey * cos;
      const dirZ = forwardKey * cos - strafeKey * sin;
      force.x = dirX * speed;
      force.z = dirZ * speed;
      slimeBody.applyForce(force, slimeBody.position);

      const nearGround = slimeBody.position.y <= 1.35;
      if (nearGround) state.canJump = true;

      if (state.keys['Space'] && state.canJump) {
        state.jumpCharge = Math.min(1, state.jumpCharge + dt * 2.4);
        state.squash = Math.max(state.squash, 0.18 + state.jumpCharge * 0.18);
      }
      if (!state.keys['Space'] && state.wasSpaceDown && state.canJump) {
        slimeBody.velocity.y = 8.6 + state.jumpCharge * 4.2;
        state.canJump = false;
        state.squash = Math.max(state.squash, 0.26 + state.jumpCharge * 0.1);
        state.jitter = 0.14 + state.jumpCharge * 0.06;
        state.jumpCharge = 0;
      }
      state.wasSpaceDown = !!state.keys['Space'];

      const hSpeed = Math.hypot(slimeBody.velocity.x, slimeBody.velocity.z);
      const wobble = Math.min(0.45, hSpeed * 0.024) + state.squash;
      const pulse = 0.07 * Math.sin(nowMs * 0.031);
      const tremble = 0.025 * Math.sin(nowMs * 0.19);
      const idleFlatten = nearGround ? 0.2 : 0.04;
      const targetY = 1 - idleFlatten + wobble * 0.6 + pulse;
      const targetXZ = 1 + idleFlatten * 0.88 - wobble * 0.34;
      state.localScale.x += (targetXZ - state.localScale.x) * Math.min(1, dt * 13);
      state.localScale.y += (targetY - state.localScale.y) * Math.min(1, dt * 13);
      state.localScale.z += (targetXZ - state.localScale.z) * Math.min(1, dt * 13);

      const jitterX = (Math.random() - 0.5) * state.jitter + tremble;
      const jitterZ = (Math.random() - 0.5) * state.jitter - tremble;
      slimeMesh.scale.set(state.localScale.x + jitterX, state.localScale.y, state.localScale.z + jitterZ);
      slimeShellMesh.rotation.y += 0.8 * dt;

      // 着地グニャッ演出
      if (nearGround && Math.abs(slimeBody.velocity.y) < 0.55) {
        state.squash = Math.max(state.squash, 0.12);
        state.jitter = Math.max(state.jitter, 0.05);
        if (forwardKey === 0 && strafeKey === 0) {
          slimeBody.velocity.x *= 0.78;
          slimeBody.velocity.z *= 0.78;
        }
      }

      state.squash *= Math.max(0, 1 - dt * 6.3);
      state.jitter *= Math.max(0, 1 - dt * 5.2);

      if (localSlimeUniforms) {
        localSlimeUniforms.uTime.value = nowMs / 1000;
        localSlimeUniforms.uJitter.value = state.jitter;
        localSlimeUniforms.uSquash.value = state.squash;
      }
    }

    function updateCamera() {
      const THREE = THREE_LIB;
      const p = slimeMesh.position;
      const dist = 8.8;
      const eye = new THREE.Vector3(
        p.x - Math.sin(state.cameraYaw) * dist,
        p.y + 4.5 + Math.sin(state.cameraPitch) * 2,
        p.z - Math.cos(state.cameraYaw) * dist,
      );
      camera.position.lerp(eye, 0.1);
      const look = new THREE.Vector3(
        p.x + Math.sin(state.cameraYaw) * 3,
        p.y + 1.0 + Math.sin(state.cameraPitch) * 2,
        p.z + Math.cos(state.cameraYaw) * 3,
      );
      camera.lookAt(look);
    }

    function animateDecor(nowMs) {
      if (!decorGroup?.userData?.flowers) return;
      for (const f of decorGroup.userData.flowers) {
        const windA = Math.sin(nowMs * 0.002 + f.userData.baseRot) * 0.1;
        const windB = Math.sin(nowMs * 0.0037 + f.userData.baseRot * 0.61) * 0.06;
        f.rotation.z = windA + windB;
        f.rotation.x = windB * 0.5;
      }
    }

    function applyRemoteState(peerId, data) {
      if (!state.sceneReady || !remoteGroup) return;
      const THREE = THREE_LIB;
      let remote = state.remotePlayers.get(peerId);
      if (!remote) {
        const mat = createJellyMaterial(0x60a5fa);
        const mesh = new THREE.Mesh(new THREE.SphereGeometry(1, 42, 42), mat);
        const uniforms = attachJitterShader(mat);
        remote = { mesh, uniforms, squash: 0, jitter: 0 };
        remoteGroup.add(mesh);
        state.remotePlayers.set(peerId, remote);
      }
      remote.mesh.position.set(data.x || 0, data.y || 2, data.z || 0);
      remote.mesh.scale.set(data.sx || 1, data.sy || 1, data.sz || 1);
      remote.jitter = data.jitter || 0;
      remote.squash = data.squash || 0;
      if (remote.uniforms) {
        remote.uniforms.uTime.value = performance.now() / 1000;
        remote.uniforms.uJitter.value = remote.jitter;
        remote.uniforms.uSquash.value = remote.squash;
      }
    }

    function removeRemote(peerId) {
      const r = state.remotePlayers.get(peerId);
      if (!r) return;
      remoteGroup.remove(r.mesh);
      r.mesh.geometry.dispose();
      r.mesh.material.dispose();
      state.remotePlayers.delete(peerId);
    }

    function syncState() {
      if (state.networkMode === 'solo') return;
      const now = performance.now();
      if (now - state.lastSyncAt < 90) return;
      state.lastSyncAt = now;
      broadcast({
        type: 'state',
        name: state.username,
        x: slimeMesh.position.x,
        y: slimeMesh.position.y,
        z: slimeMesh.position.z,
        sx: slimeMesh.scale.x,
        sy: slimeMesh.scale.y,
        sz: slimeMesh.scale.z,
        jitter: state.jitter,
        squash: state.squash,
      });
    }

    function toggleChatInput(show) {
      state.isChatTyping = show;
      chatInputRow.classList.toggle('active', show);
      if (show) {
        chatInput.value = '';
        chatInput.focus();
        if (document.pointerLockElement) document.exitPointerLock();
      } else {
        chatInput.blur();
      }
    }

    function sendChatMessage(text) {
      const msg = text.trim();
      if (!msg) return;
      addChatLine('me', `${state.username}: ${msg}`);
      broadcast({ type: 'chat', name: state.username, text: msg });
    }

    let prevTime = performance.now();
    function loop(now) {
      if (!state.sceneReady) return;
      const dt = Math.min(0.05, (now - prevTime) / 1000);
      prevTime = now;

      controlStep(dt, now);
      world.step(1 / 60, dt, 3);
      slimeMesh.position.set(slimeBody.position.x, slimeBody.position.y, slimeBody.position.z);
      const hSpeed = Math.hypot(slimeBody.velocity.x, slimeBody.velocity.z);
      const landingImpact = Math.max(0, Math.abs(slimeBody.velocity.y) - 1.5) * 0.05;
      stepSoftBody(dt, hSpeed, landingImpact, slimeBody.position.y <= 1.35);
      animateDecor(now);
      updateCamera();
      syncState();
      renderer.render(scene, camera);
      requestAnimationFrame(loop);
    }

    async function startGame(mode, room) {
      if (!state.libsReady) return setStatus(menuStatus, 'ライブラリ読み込み待機中です。', true);
      loginScreen.classList.add('hidden');
      menuScreen.classList.add('hidden');
      gameRoot.classList.remove('hidden');
      hud.classList.remove('hidden');
      nameLabel.textContent = `Player: ${state.username}`;

      if (!state.sceneReady) {
        try { await initScene(); }
        catch (error) {
          loginScreen.classList.remove('hidden');
          gameRoot.classList.add('hidden');
          hud.classList.add('hidden');
          setStatus(loginStatus, error.message || '初期化に失敗しました', true);
          return;
        }
      }
      addChatLine('system', `${state.username} がゲームに参加しました`);
      await setupNetworking(mode, room);
      updateNetworkUI();
    }

    function cleanupAndBackToTitle() {
      if (document.pointerLockElement) document.exitPointerLock();
      state.keys = {};
      state.isChatTyping = false;
      chatInputRow.classList.remove('active');

      if (state.peer) {
        try { state.peer.destroy(); } catch {}
      }
      state.peer = null;
      state.peerId = '';
      state.connections.clear();

      for (const pid of [...state.remotePlayers.keys()]) removeRemote(pid);
      state.remotePlayers.clear();

      gameRoot.classList.add('hidden');
      hud.classList.add('hidden');
      menuScreen.classList.remove('hidden');
      setStatus(menuStatus, 'タイトルへ戻りました。モードを選んで再開できます。');
    }

    async function handleRegister() {
      const u = usernameInput.value.trim();
      const p = passwordInput.value;
      if (!u || !p) return setStatus(loginStatus, 'ユーザー名とパスワードを入力してください', true);
      try {
        state.username = await registerAccount(u, p);
        setStatus(loginStatus, '新規登録に成功しました。');
        loginScreen.classList.add('hidden');
        menuScreen.classList.remove('hidden');
      } catch (e) { setStatus(loginStatus, e.message || '新規登録に失敗', true); }
    }

    async function handleLogin() {
      const u = usernameInput.value.trim();
      const p = passwordInput.value;
      if (!u || !p) return setStatus(loginStatus, 'ユーザー名とパスワードを入力してください', true);
      try {
        state.username = await loginAccount(u, p);
        setStatus(loginStatus, 'ログイン成功');
        loginScreen.classList.add('hidden');
        menuScreen.classList.remove('hidden');
      } catch (e) { setStatus(loginStatus, e.message || 'ログイン失敗', true); }
    }

    function bindUI() {
      loginBtn.addEventListener('click', handleLogin);
      registerBtn.addEventListener('click', handleRegister);
      quickPlayBtn.addEventListener('click', () => startGame('online', 'quick-flat'));
      joinRoomBtn.addEventListener('click', () => {
        const room = roomInput.value.trim();
        if (!room) return setStatus(menuStatus, '部屋番号を入力してください', true);
        startGame('online', room);
      });
      soloBtn.addEventListener('click', () => startGame('solo', 'solo'));
      exitBtn.addEventListener('click', cleanupAndBackToTitle);

      document.addEventListener('keydown', (e) => {
        if (!state.sceneReady) return;

        if ((e.code === 'KeyT' || e.code === 'Enter') && !state.isChatTyping) {
          e.preventDefault();
          toggleChatInput(true);
          return;
        }
        if (state.isChatTyping && e.code === 'Enter') {
          e.preventDefault();
          sendChatMessage(chatInput.value);
          toggleChatInput(false);
          return;
        }
        if (state.isChatTyping && e.code === 'Escape') {
          e.preventDefault();
          toggleChatInput(false);
          return;
        }
        state.keys[e.code] = true;
      });

      document.addEventListener('keyup', (e) => { state.keys[e.code] = false; });
      chatInput.addEventListener('keydown', (e) => {
        if (e.code === 'Enter') {
          e.preventDefault();
          sendChatMessage(chatInput.value);
          toggleChatInput(false);
        }
      });
      usernameInput.addEventListener('keydown', (e) => { if (e.code === 'Enter') handleLogin(); });
      passwordInput.addEventListener('keydown', (e) => { if (e.code === 'Enter') handleLogin(); });
    }

    async function bootstrap() {
      bindUI();
      usernameInput.value = localStorage.getItem(LAST_USER_KEY) || '';
      quickPlayBtn.disabled = true;
      joinRoomBtn.disabled = true;
      soloBtn.disabled = true;

      try {
        await ensureLibrariesLoaded();
        quickPlayBtn.disabled = false;
        joinRoomBtn.disabled = false;
        soloBtn.disabled = false;
      } catch (error) {
        setStatus(libStatus, `ライブラリ読み込み失敗: ${error.message}。ネットワーク制限により3Dライブラリを読み込めません。広告ブロックをオフにするか、別の回線を試してください。詳細はF12コンソールを確認。`, true);
      }
    }

    window.addEventListener('DOMContentLoaded', bootstrap);
  </script>
</body>
</html>
