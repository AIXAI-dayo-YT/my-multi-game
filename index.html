<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slime Playground - Step 2</title>
  <style>
    :root {
      --panel: rgba(15, 23, 42, 0.82);
      --line: rgba(148, 163, 184, 0.3);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --warn: #f59e0b;
      --ok: #22c55e;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: "Inter", "Noto Sans JP", "Yu Gothic", sans-serif;
      background: radial-gradient(circle at top, #1e293b 0%, #020617 80%);
      color: var(--text);
      overflow: hidden;
    }
    .hidden { display: none !important; }
    .screen {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 18px;
      z-index: 20;
    }
    .card {
      width: min(760px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 20px;
      backdrop-filter: blur(8px);
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.35);
    }
    h1, h2 { margin: 0 0 10px; }
    p { margin: 0 0 12px; color: var(--muted); }
    .row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    input, button, select {
      font: inherit;
      border-radius: 10px;
      border: 1px solid var(--line);
      padding: 10px 12px;
    }
    input, select {
      background: rgba(15, 23, 42, 0.6);
      color: var(--text);
      flex: 1;
      min-width: 180px;
    }
    button {
      border: none;
      font-weight: 700;
      background: #0ea5e9;
      color: #082f49;
      cursor: pointer;
    }
    button:hover { filter: brightness(1.08); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .sub-btn { background: #64748b; color: #f8fafc; }
    .status {
      min-height: 1.4em;
      color: var(--muted);
      font-size: 0.95rem;
    }
    #gameRoot {
      position: fixed;
      inset: 0;
      background: #87ceeb;
    }
    #hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }
    .panel {
      position: absolute;
      background: rgba(2, 6, 23, 0.72);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      backdrop-filter: blur(4px);
    }
    #chatPanel {
      top: 12px;
      left: 12px;
      width: min(460px, calc(100vw - 24px));
      pointer-events: auto;
      background: rgba(2, 6, 23, 0.82);
    }
    #chatLog {
      max-height: 210px;
      overflow-y: auto;
      font-size: 0.9rem;
      line-height: 1.4;
      margin-bottom: 8px;
      display: grid;
      gap: 4px;
    }
    .chat-line.system { color: #cbd5e1; }
    .chat-line.me { color: #7dd3fc; }
    .chat-line.other { color: #86efac; }
    #chatInputRow { display: none; }
    #chatInputRow.active { display: flex; gap: 8px; }
    #chatInput {
      background: rgba(2, 6, 23, 0.94);
      border: 1px solid var(--line);
      color: var(--text);
      flex: 1;
      padding: 8px;
      border-radius: 8px;
    }
    #topRight {
      top: 12px;
      right: 12px;
      min-width: 260px;
      font-size: 0.9rem;
      color: #dbeafe;
    }
    #crosshair {
      position: absolute;
      top: 50%; left: 50%;
      width: 10px; height: 10px;
      margin-left: -5px; margin-top: -5px;
      border: 1px solid rgba(255, 255, 255, 0.75);
      border-radius: 50%;
    }
    .hint { color: #bae6fd; font-size: 0.85rem; }
  </style>
</head>
<body>
  <section id="loginScreen" class="screen">
    <div class="card">
      <h1>ステップ2: Slime Flat World</h1>
      <p>アカウントでログインしてください（同じユーザー名は登録不可）。</p>
      <div class="row">
        <input id="usernameInput" type="text" maxlength="24" placeholder="ユーザー名" autocomplete="username" />
        <input id="passwordInput" type="password" maxlength="64" placeholder="パスワード" autocomplete="current-password" />
      </div>
      <div class="row">
        <button id="loginBtn">ログイン</button>
        <button id="registerBtn" class="sub-btn">新規登録</button>
      </div>
      <div id="libStatus" class="status">ライブラリを読み込み中...</div>
      <p class="hint">※ データはこのブラウザの LocalStorage に保存され、アップデート後も同じアカウントでログインできます。</p>
      <div id="loginStatus" class="status"></div>
    </div>
  </section>

  <section id="menuScreen" class="screen hidden">
    <div class="card">
      <h2>モード選択</h2>
      <p>フラット（平原）モードのみ選択できます。</p>
      <div class="row">
        <select id="modeSelect" disabled>
          <option value="flat" selected>フラット（平原）</option>
        </select>
      </div>
      <div class="row">
        <button id="quickPlayBtn">クイックプレイ（自動接続）</button>
        <button id="soloBtn" class="sub-btn">シングルで開始</button>
      </div>
      <div class="row">
        <input id="roomInput" type="text" placeholder="部屋番号（例: 1234）" />
        <button id="joinRoomBtn">部屋番号で入室</button>
      </div>
      <div id="menuStatus" class="status"></div>
    </div>
  </section>

  <div id="gameRoot" class="hidden"></div>

  <div id="hud" class="hidden">
    <div id="chatPanel" class="panel">
      <div id="chatLog"></div>
      <div id="chatInputRow"><input id="chatInput" type="text" maxlength="220" placeholder="メッセージを入力してEnterで送信" /></div>
      <div class="hint">T または Enter でチャット入力</div>
    </div>

    <div id="topRight" class="panel">
      <div><strong id="nameLabel"></strong></div>
      <div>接続ID: <span id="peerIdLabel">-</span></div>
      <div>接続数: <span id="peersCount">0</span></div>
      <div id="netState">オフライン（シングル）</div>
      <div class="hint">移動: WASD / 矢印・ジャンプ: Space</div>
    </div>

    <div id="crosshair"></div>
  </div>

  <script>
    const ACCOUNT_KEY = 'slime_accounts_v2';
    const LAST_USER_KEY = 'slime_last_user_v2';

    const loginScreen = document.getElementById('loginScreen');
    const menuScreen = document.getElementById('menuScreen');
    const gameRoot = document.getElementById('gameRoot');
    const hud = document.getElementById('hud');

    const usernameInput = document.getElementById('usernameInput');
    const passwordInput = document.getElementById('passwordInput');
    const loginBtn = document.getElementById('loginBtn');
    const registerBtn = document.getElementById('registerBtn');
    const loginStatus = document.getElementById('loginStatus');
    const libStatus = document.getElementById('libStatus');

    const quickPlayBtn = document.getElementById('quickPlayBtn');
    const joinRoomBtn = document.getElementById('joinRoomBtn');
    const soloBtn = document.getElementById('soloBtn');
    const roomInput = document.getElementById('roomInput');
    const menuStatus = document.getElementById('menuStatus');

    const chatLog = document.getElementById('chatLog');
    const chatInput = document.getElementById('chatInput');
    const chatInputRow = document.getElementById('chatInputRow');
    const nameLabel = document.getElementById('nameLabel');
    const peerIdLabel = document.getElementById('peerIdLabel');
    const peersCount = document.getElementById('peersCount');
    const netState = document.getElementById('netState');

    const state = {
      libsReady: false,
      username: '',
      sceneReady: false,
      networkMode: 'solo',
      room: '',
      peer: null,
      peerId: '',
      connections: new Map(),
      remotePlayers: new Map(),
      isChatTyping: false,
      keys: {},
      canJump: false,
      localScale: { x: 1, y: 1, z: 1 },
      squash: 0,
      jitter: 0,
      lastSyncAt: 0,
    };
    let THREE_LIB = null;
    let CANNON_LIB = null;
    let PeerCtor = null;

    function setStatus(el, text, warn = false) {
      el.textContent = text;
      el.style.color = warn ? 'var(--warn)' : 'var(--muted)';
    }

    function addChatLine(kind, text) {
      const div = document.createElement('div');
      div.className = `chat-line ${kind}`;
      div.textContent = text;
      chatLog.appendChild(div);
      chatLog.scrollTop = chatLog.scrollHeight;
      if (chatLog.childElementCount > 120) chatLog.removeChild(chatLog.firstChild);
    }

    function loadAccounts() {
      try {
        const parsed = JSON.parse(localStorage.getItem(ACCOUNT_KEY) || '{}');
        return parsed && typeof parsed === 'object' ? parsed : {};
      } catch {
        return {};
      }
    }

    function saveAccounts(accounts) {
      localStorage.setItem(ACCOUNT_KEY, JSON.stringify(accounts));
    }

    async function sha256(text) {
      const bytes = new TextEncoder().encode(text);
      const hash = await crypto.subtle.digest('SHA-256', bytes);
      return [...new Uint8Array(hash)].map(v => v.toString(16).padStart(2, '0')).join('');
    }

    function normalizeUsername(name) {
      return name.trim().toLowerCase();
    }

    async function registerAccount(username, password) {
      const key = normalizeUsername(username);
      const accounts = loadAccounts();
      if (accounts[key]) throw new Error('そのユーザー名は既に使われています');

      const salt = crypto.randomUUID();
      const passHash = await sha256(`${salt}:${password}`);
      accounts[key] = { username, salt, passHash, createdAt: new Date().toISOString() };
      saveAccounts(accounts);
      localStorage.setItem(LAST_USER_KEY, username);
      return username;
    }

    async function loginAccount(username, password) {
      const key = normalizeUsername(username);
      const accounts = loadAccounts();
      const account = accounts[key];
      if (!account) throw new Error('アカウントが存在しません。新規登録してください');

      const passHash = await sha256(`${account.salt}:${password}`);
      if (passHash !== account.passHash) throw new Error('パスワードが違います');

      localStorage.setItem(LAST_USER_KEY, account.username);
      return account.username;
    }

    function roomHostId(room) {
      return `flat-room-${room}`.replace(/[^a-zA-Z0-9\-]/g, '').slice(0, 45) || 'flat-room-default';
    }

    function updateNetworkUI() {
      peerIdLabel.textContent = state.peerId || '-';
      peersCount.textContent = String(state.connections.size);
      netState.textContent = state.networkMode === 'solo' ? 'オフライン（シングル）' : `オンライン (${state.room})`;
    }

    function attachConnection(conn) {
      state.connections.set(conn.peer, conn);
      updateNetworkUI();

      conn.on('open', () => {
        addChatLine('system', `接続: ${conn.peer}`);
        conn.send({ type: 'hello', name: state.username, id: state.peerId });
      });

      conn.on('data', (msg) => {
        if (!msg || typeof msg !== 'object') return;
        if (msg.type === 'hello') addChatLine('system', `${msg.name || 'Player'} が参加しました`);
        if (msg.type === 'chat') addChatLine('other', `${msg.name || 'Player'}: ${msg.text || ''}`);
        if (msg.type === 'state') applyRemoteState(conn.peer, msg);
      });

      conn.on('close', () => {
        state.connections.delete(conn.peer);
        removeRemote(conn.peer);
        updateNetworkUI();
        addChatLine('system', `切断: ${conn.peer}`);
      });

      conn.on('error', (e) => addChatLine('system', `接続エラー: ${e.message || e}`));
    }

    function createPeer(desiredId) {
      return new Promise((resolve, reject) => {
        const peer = desiredId ? new PeerCtor(desiredId) : new PeerCtor();
        let opened = false;

        peer.on('open', (id) => {
          opened = true;
          resolve({ peer, id });
        });

        peer.on('connection', (conn) => attachConnection(conn));

        peer.on('error', (err) => {
          if (!opened) reject(err);
          else addChatLine('system', `Peerエラー: ${err.type || err.message || err}`);
        });
      });
    }

    async function setupNetworking(mode, room) {
      state.networkMode = mode;
      state.room = room || '';

      if (mode === 'solo') {
        updateNetworkUI();
        return;
      }

      const hostId = roomHostId(room);
      try {
        const host = await createPeer(hostId);
        state.peer = host.peer;
        state.peerId = host.id;
        addChatLine('system', `あなたはホストです。部屋: ${room}`);
      } catch (err) {
        if (err.type === 'unavailable-id') {
          const client = await createPeer();
          state.peer = client.peer;
          state.peerId = client.id;
          attachConnection(state.peer.connect(hostId, { reliable: true }));
          addChatLine('system', `部屋 ${room} に接続を試行中...`);
        } else {
          addChatLine('system', `ネットワーク初期化失敗: ${err.type || err.message || err}`);
          addChatLine('system', 'シングルプレイで開始します。');
          state.networkMode = 'solo';
        }
      }
      updateNetworkUI();
    }

    function broadcast(payload) {
      for (const [, conn] of state.connections) {
        if (conn.open) conn.send(payload);
      }
    }

    let scene, camera, renderer, world;
    let slimeMesh, slimeShellMesh, slimeBody;
    let remoteGroup;

    function waitForLibraries(timeoutMs = 15000) {
      return new Promise((resolve, reject) => {
        const start = performance.now();
        const timer = setInterval(() => {
          if (THREE_LIB && CANNON_LIB && PeerCtor) {
            clearInterval(timer);
            resolve();
            return;
          }
          if (performance.now() - start > timeoutMs) {
            clearInterval(timer);
            reject(new Error('ライブラリ読み込みタイムアウト'));
          }
        }, 100);
      });
    }

    function delay(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    async function importModuleFromList(libraryName, urls, retryCount = 1, retryDelayMs = 350) {
      const allErrors = [];

      for (const url of urls) {
        for (let attempt = 1; attempt <= retryCount + 1; attempt++) {
          try {
            const mod = await import(url);
            console.info(`[library] ${libraryName} imported from: ${url} (attempt ${attempt})`);
            return { url, mod };
          } catch (err) {
            allErrors.push({ url, attempt, error: err });
            console.error(`[library] ${libraryName} load error`, {
              library: libraryName,
              url,
              attempt,
              error: err,
            });
            console.error('Network Error Details:', err);
            if (attempt <= retryCount) {
              await delay(retryDelayMs * attempt);
            }
          }
        }
      }

      console.error(`[library] ${libraryName} failed on all CDNs`, allErrors);
      throw new Error(`${libraryName} の読み込みに失敗しました（全CDN / 全リトライ失敗）`);
    }

    async function ensureLibrariesLoaded() {
      const loadedSources = {};
      try {
        const peerImport = await importModuleFromList('PeerJS', [
          'https://cdn.skypack.dev/peerjs@1.5.5',
          'https://esm.sh/peerjs@1.5.5',
          'https://cdn.jsdelivr.net/npm/peerjs@1.5.5/+esm'
        ], 1, 500);
        loadedSources.peerjs = peerImport.url;
        PeerCtor = peerImport.mod.Peer || peerImport.mod.default?.Peer || peerImport.mod.default;

        const threeImport = await importModuleFromList('Three.js', [
          'https://cdn.skypack.dev/three@0.161.0',
          'https://esm.sh/three@0.161.0',
          'https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js'
        ], 1, 500);
        loadedSources.three = threeImport.url;
        THREE_LIB = threeImport.mod;

        const cannonImport = await importModuleFromList('Cannon.js', [
          'https://cdn.skypack.dev/cannon-es@0.20.0',
          'https://esm.sh/cannon-es@0.20.0'
        ], 1, 500);
        loadedSources.cannon = cannonImport.url;
        CANNON_LIB = cannonImport.mod;

        await waitForLibraries();
        state.libsReady = true;
        setStatus(libStatus, 'ライブラリ読み込み完了');
        console.info('[library] all libraries loaded', loadedSources);
      } catch (err) {
        const missing = [];
        if (!PeerCtor) missing.push('PeerJS');
        if (!THREE_LIB) missing.push('Three.js');
        if (!CANNON_LIB) missing.push('Cannon.js');
        console.error('[library] initialization stopped. Missing libraries:', missing, err);
        console.error('Network Error Details:', err);
        throw err;
      }
    }

    function createSlimeMaterial() {
      return new THREE_LIB.MeshPhysicalMaterial({
        color: 0x5eead4,
        metalness: 0.2,
        roughness: 0.03,
        transmission: 0.95,
        transparent: true,
        opacity: 0.94,
        thickness: 2.1,
        ior: 1.35,
        clearcoat: 1,
        clearcoatRoughness: 0.06,
        specularIntensity: 1,
        reflectivity: 0.95,
      });
    }

    async function initScene() {
      await waitForLibraries();
      const THREE = THREE_LIB;
      const CANNON = CANNON_LIB;

      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x87ceeb);
      scene.fog = new THREE.Fog(0x9bd7ff, 110, 420);

      camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1400);
      camera.position.set(0, 7, 11);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.12;
      gameRoot.appendChild(renderer.domElement);

      scene.add(new THREE.HemisphereLight(0xffffff, 0x88aaff, 0.95));
      const sun = new THREE.DirectionalLight(0xffffff, 1.25);
      sun.position.set(9, 18, 8);
      scene.add(sun);

      const rim = new THREE.PointLight(0x99ddff, 0.8, 45);
      rim.position.set(-4, 4, -4);
      scene.add(rim);

      const floorMesh = new THREE.Mesh(
        new THREE.PlaneGeometry(2000, 2000),
        new THREE.MeshStandardMaterial({ color: 0x6ee7b7, roughness: 0.95, metalness: 0.02 })
      );
      floorMesh.rotation.x = -Math.PI / 2;
      scene.add(floorMesh);

      slimeMesh = new THREE.Mesh(new THREE.SphereGeometry(1, 64, 64), createSlimeMaterial());
      slimeMesh.position.set(0, 2, 0);

      slimeShellMesh = new THREE.Mesh(
        new THREE.SphereGeometry(1.06, 48, 48),
        new THREE.MeshPhysicalMaterial({
          color: 0xb6fff6,
          transparent: true,
          opacity: 0.2,
          roughness: 0.02,
          metalness: 0.05,
          transmission: 1,
          thickness: 0.7,
        })
      );
      slimeMesh.add(slimeShellMesh);
      scene.add(slimeMesh);

      remoteGroup = new THREE.Group();
      scene.add(remoteGroup);

      world = new CANNON.World();
      world.gravity.set(0, -24, 0);
      world.broadphase = new CANNON.NaiveBroadphase();
      world.solver.iterations = 10;

      const groundBody = new CANNON.Body({ mass: 0, shape: new CANNON.Plane() });
      groundBody.quaternion.setFromEuler(-Math.PI / 2, 0, 0);
      world.addBody(groundBody);

      slimeBody = new CANNON.Body({ mass: 1.2, shape: new CANNON.Sphere(1), position: new CANNON.Vec3(0, 3.5, 0) });
      slimeBody.linearDamping = 0.24;
      world.addBody(slimeBody);

      window.addEventListener('resize', onResize);
      state.sceneReady = true;
      requestAnimationFrame(loop);
    }

    function onResize() {
      if (!renderer) return;
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function controlStep(dt, nowMs) {
      if (state.isChatTyping) return;
      const CANNON = CANNON_LIB;

      const speed = 14;
      const force = new CANNON.Vec3(0, 0, 0);
      const forward = (state.keys['KeyW'] || state.keys['ArrowUp'] ? 1 : 0) - (state.keys['KeyS'] || state.keys['ArrowDown'] ? 1 : 0);
      const strafe = (state.keys['KeyD'] || state.keys['ArrowRight'] ? 1 : 0) - (state.keys['KeyA'] || state.keys['ArrowLeft'] ? 1 : 0);
      force.x = strafe * speed;
      force.z = -forward * speed;
      slimeBody.applyForce(force, slimeBody.position);

      const nearGround = slimeBody.position.y <= 1.05;
      if (nearGround) state.canJump = true;

      if (state.keys['Space'] && state.canJump) {
        slimeBody.velocity.y = 10;
        state.canJump = false;
        state.squash = Math.max(state.squash, 0.26);
        state.jitter = 0.16;
      }

      const horizontalSpeed = Math.hypot(slimeBody.velocity.x, slimeBody.velocity.z);
      const wobble = Math.min(0.28, horizontalSpeed * 0.017) + state.squash;
      const pulse = 0.065 * Math.sin(nowMs * 0.032);
      const tremble = 0.02 * Math.sin(nowMs * 0.17);

      const targetY = 1 + wobble * 0.9 + pulse;
      const targetXZ = 1 - wobble * 0.48;
      state.localScale.x += (targetXZ - state.localScale.x) * Math.min(1, dt * 13);
      state.localScale.y += (targetY - state.localScale.y) * Math.min(1, dt * 13);
      state.localScale.z += (targetXZ - state.localScale.z) * Math.min(1, dt * 13);

      const jitterX = (Math.random() - 0.5) * state.jitter + tremble;
      const jitterZ = (Math.random() - 0.5) * state.jitter - tremble;
      slimeMesh.scale.set(state.localScale.x + jitterX, state.localScale.y, state.localScale.z + jitterZ);
      slimeMesh.rotation.y = 0.04 * Math.sin(nowMs * 0.01);
      slimeShellMesh.rotation.y += 0.75 * dt;

      state.squash *= Math.max(0, 1 - dt * 6.2);
      state.jitter *= Math.max(0, 1 - dt * 5.0);

      if (nearGround && Math.abs(slimeBody.velocity.y) < 0.65) {
        state.squash = Math.max(state.squash, 0.1);
        state.jitter = Math.max(state.jitter, 0.04);
      }
    }

    function updateCamera() {
      const THREE = THREE_LIB;
      const p = slimeMesh.position;
      const desired = new THREE.Vector3(p.x + 0.2, p.y + 4.9, p.z + 9.0);
      camera.position.lerp(desired, 0.07);
      camera.lookAt(p.x, p.y + 0.7, p.z);
    }

    function applyRemoteState(peerId, data) {
      if (!state.sceneReady || !remoteGroup) return;
      const THREE = THREE_LIB;
      let remote = state.remotePlayers.get(peerId);
      if (!remote) {
        const mesh = new THREE.Mesh(new THREE.SphereGeometry(1, 40, 40), new THREE.MeshPhysicalMaterial({
          color: 0x60a5fa,
          metalness: 0.2,
          roughness: 0.12,
          transmission: 0.72,
          transparent: true,
          opacity: 0.84,
        }));
        remoteGroup.add(mesh);
        remote = { mesh };
        state.remotePlayers.set(peerId, remote);
      }
      remote.mesh.position.set(data.x || 0, data.y || 2, data.z || 0);
      remote.mesh.scale.set(data.sx || 1, data.sy || 1, data.sz || 1);
    }

    function removeRemote(peerId) {
      const remote = state.remotePlayers.get(peerId);
      if (!remote || !remoteGroup) return;
      remoteGroup.remove(remote.mesh);
      remote.mesh.geometry.dispose();
      remote.mesh.material.dispose();
      state.remotePlayers.delete(peerId);
    }

    function syncState() {
      if (state.networkMode === 'solo') return;
      const now = performance.now();
      if (now - state.lastSyncAt < 90) return;
      state.lastSyncAt = now;

      broadcast({
        type: 'state',
        name: state.username,
        x: slimeMesh.position.x,
        y: slimeMesh.position.y,
        z: slimeMesh.position.z,
        sx: slimeMesh.scale.x,
        sy: slimeMesh.scale.y,
        sz: slimeMesh.scale.z,
      });
    }

    let prevTime = performance.now();
    function loop(now) {
      if (!state.sceneReady) return;
      const dt = Math.min(0.05, (now - prevTime) / 1000);
      prevTime = now;

      controlStep(dt, now);
      world.step(1 / 60, dt, 3);

      slimeMesh.position.set(slimeBody.position.x, slimeBody.position.y, slimeBody.position.z);
      updateCamera();
      syncState();

      renderer.render(scene, camera);
      requestAnimationFrame(loop);
    }

    function toggleChatInput(show) {
      state.isChatTyping = show;
      chatInputRow.classList.toggle('active', show);
      if (show) {
        chatInput.value = '';
        chatInput.focus();
      } else {
        chatInput.blur();
      }
    }

    function sendChatMessage(text) {
      const message = text.trim();
      if (!message) return;
      addChatLine('me', `${state.username}: ${message}`);
      broadcast({ type: 'chat', name: state.username, text: message });
    }

    async function startGame(networkMode, room) {
      if (!state.libsReady) {
        setStatus(menuStatus, 'ライブラリ読み込み待機中です。少し待ってください。', true);
        return;
      }

      loginScreen.classList.add('hidden');
      menuScreen.classList.add('hidden');
      gameRoot.classList.remove('hidden');
      hud.classList.remove('hidden');
      nameLabel.textContent = `Player: ${state.username}`;

      if (!state.sceneReady) {
        try {
          await initScene();
        } catch (err) {
          gameRoot.classList.add('hidden');
          hud.classList.add('hidden');
          loginScreen.classList.remove('hidden');
          setStatus(loginStatus, err.message || '初期化に失敗しました', true);
          return;
        }
      }

      addChatLine('system', `${state.username} がゲームに参加しました`);
      await setupNetworking(networkMode, room);
      updateNetworkUI();
    }

    async function handleRegister() {
      const username = usernameInput.value.trim();
      const password = passwordInput.value;
      if (!username || !password) {
        setStatus(loginStatus, 'ユーザー名とパスワードを入力してください', true);
        return;
      }

      try {
        const confirmedName = await registerAccount(username, password);
        state.username = confirmedName;
        setStatus(loginStatus, '新規登録に成功しました。ログイン済みです。');
        loginScreen.classList.add('hidden');
        menuScreen.classList.remove('hidden');
        setStatus(menuStatus, 'モードを選んで開始してください');
      } catch (err) {
        setStatus(loginStatus, err.message || '新規登録に失敗しました', true);
      }
    }

    async function handleLogin() {
      const username = usernameInput.value.trim();
      const password = passwordInput.value;
      if (!username || !password) {
        setStatus(loginStatus, 'ユーザー名とパスワードを入力してください', true);
        return;
      }

      try {
        const confirmedName = await loginAccount(username, password);
        state.username = confirmedName;
        setStatus(loginStatus, 'ログイン成功');
        loginScreen.classList.add('hidden');
        menuScreen.classList.remove('hidden');
        setStatus(menuStatus, 'モードを選んで開始してください');
      } catch (err) {
        setStatus(loginStatus, err.message || 'ログイン失敗', true);
      }
    }

    function bindUIEvents() {
      loginBtn.addEventListener('click', handleLogin);
      registerBtn.addEventListener('click', handleRegister);

      quickPlayBtn.addEventListener('click', async () => {
        setStatus(menuStatus, 'クイックプレイを開始します...');
        await startGame('online', 'quick-flat');
      });

      joinRoomBtn.addEventListener('click', async () => {
        const room = roomInput.value.trim();
        if (!room) {
          setStatus(menuStatus, '部屋番号を入力してください', true);
          return;
        }
        setStatus(menuStatus, `部屋 ${room} へ入室します...`);
        await startGame('online', room);
      });

      soloBtn.addEventListener('click', async () => {
        setStatus(menuStatus, 'シングルプレイで開始します');
        await startGame('solo', 'solo');
      });

      document.addEventListener('keydown', (e) => {
        if (!state.sceneReady) return;

        if ((e.code === 'KeyT' || e.code === 'Enter') && !state.isChatTyping) {
          e.preventDefault();
          toggleChatInput(true);
          return;
        }

        if (state.isChatTyping && e.code === 'Enter') {
          e.preventDefault();
          sendChatMessage(chatInput.value);
          toggleChatInput(false);
          return;
        }

        if (state.isChatTyping && e.code === 'Escape') {
          e.preventDefault();
          toggleChatInput(false);
          return;
        }

        state.keys[e.code] = true;
      });

      document.addEventListener('keyup', (e) => {
        state.keys[e.code] = false;
      });

      chatInput.addEventListener('keydown', (e) => {
        if (e.code === 'Enter') {
          e.preventDefault();
          sendChatMessage(chatInput.value);
          toggleChatInput(false);
        }
      });

      usernameInput.addEventListener('keydown', (e) => {
        if (e.code === 'Enter') handleLogin();
      });

      passwordInput.addEventListener('keydown', (e) => {
        if (e.code === 'Enter') handleLogin();
      });
    }

    async function bootstrap() {
      bindUIEvents();

      usernameInput.value = localStorage.getItem(LAST_USER_KEY) || '';
      quickPlayBtn.disabled = true;
      joinRoomBtn.disabled = true;
      soloBtn.disabled = true;

      try {
        await ensureLibrariesLoaded();
        quickPlayBtn.disabled = false;
        joinRoomBtn.disabled = false;
        soloBtn.disabled = false;
      } catch (err) {
        setStatus(libStatus, `ライブラリ読み込み失敗: ${err.message}。ネットワーク制限により3Dライブラリを読み込めません。広告ブロックをオフにするか、別の回線を試してください。詳細はブラウザのコンソール（F12）を確認してください。`, true);
      }
    }

    window.addEventListener('DOMContentLoaded', bootstrap);
  </script>
</body>
</html>
